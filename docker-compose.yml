services:
  backend:
    build: ./backend
    container_name: login-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: login-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
